version: '3.8'

services:
  daily-etl:
    image: python:3.12-slim
    container_name: daily-etl
    network_mode: host
    working_dir: /app
    volumes:
      - /volume1/docker/option-data-collector:/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app:/app/archive/original-files
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python daily_pipeline.py"
    restart: unless-stopped