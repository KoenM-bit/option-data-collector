name: Deploy to Synology

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download artifact
      uses: actions/download-artifact@v3
      with:
        name: docker-image
        run-id: ${{ github.event.workflow_run.id }}
    
    - name: Deploy to Synology
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.SYNOLOGY_HOST }}
        username: ${{ secrets.SYNOLOGY_USER }}
        key: ${{ secrets.SYNOLOGY_SSH_KEY }}
        script: |
          cd /volume1/docker/option-api
          
          # Backup current version
          docker-compose -f docker-compose.prod.yml down
          docker tag option-collector:latest option-collector:backup || true
          
          # Load new image (you would need to transfer the image file first)
          # For now, just rebuild from source
          git pull origin main
          
          # Deploy with new structured code
          docker-compose -f docker-compose.prod.yml build
          docker-compose -f docker-compose.prod.yml up -d
          
          # Health check
          sleep 30
          if ! docker-compose -f docker-compose.prod.yml ps | grep -q "Up"; then
            echo "Deployment failed, rolling back..."
            docker-compose -f docker-compose.prod.yml down
            docker tag option-collector:backup option-collector:latest
            docker-compose -f docker-compose.prod.yml up -d
            exit 1
          fi
          
          # Cleanup
          docker image prune -f
          
          echo "✅ Deployment successful!"