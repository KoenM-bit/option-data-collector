name: Code Quality & Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    name: 🔍 Code Quality Checks

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: 🖤 Check formatting with Black
      run: black --check --diff .

    - name: 📦 Check import sorting with isort
      run: isort --check-only --diff .

    - name: 🔍 Lint with flake8
      run: flake8 .

    - name: 🔧 Advanced linting with pylint
      run: pylint src/ --rcfile=pylint.rc || true  # Don't fail on pylint for now

    - name: 🔒 Security check with bandit
      run: bandit -r src/ -f json -o bandit-report.json || true

    - name: 📊 Type checking with mypy
      run: mypy src/ --config-file=mypy.ini || true  # Don't fail on mypy for now

    - name: 🛡️ Safety check for vulnerabilities
      run: safety check --json || true

  test:
    runs-on: ubuntu-latest
    name: 🧪 Run Tests
    needs: lint-and-format

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: optionsdb_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Wait for MySQL
      run: |
        while ! mysqladmin ping -h 127.0.0.1 -P 3306 -u root -ptestpassword --silent; do
          sleep 1
        done

    - name: 🧪 Run tests with pytest
      env:
        DB_HOST: 127.0.0.1
        DB_USER: root
        DB_PASS: testpassword
        DB_NAME: optionsdb_test
        DB_PORT: 3306
        ENV: test
      run: pytest tests/ --cov=src --cov-report=xml --cov-report=html || true

    - name: 📊 Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  docker-build:
    runs-on: ubuntu-latest
    name: 🐳 Docker Build Test
    needs: [lint-and-format, test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -f docker/Dockerfile -t option-collector:test .

    - name: Test Docker image
      run: |
        docker run --rm option-collector:test python -c "
        print('🐳 Docker image test')
        import src.services.option_service
        import src.services.sentiment_service
        import src.services.etl_service
        print('✅ All imports successful')
        "

  security-scan:
    runs-on: ubuntu-latest
    name: 🔒 Security Scanning
    needs: lint-and-format

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: |
        docker build -f docker/Dockerfile -t option-collector:${{ github.sha }} .
        
    - name: Save image
      run: |
        docker save option-collector:${{ github.sha }} | gzip > image.tar.gz
        
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: image.tar.gz