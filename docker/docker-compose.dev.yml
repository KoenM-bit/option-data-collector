# Development environment configuration
version: '3.8'

services:
  option-api:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    container_name: option-api-dev
    ports:
      - "8000:8080"  # Map external port 8000 to internal port 8080
    volumes:
      - ..:/app  # Mount for live reload during development
    command: python app.py
    env_file:
      - "../.env.dev"
    depends_on:
      - mysql-dev
    restart: unless-stopped

  option-scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: option-scraper-dev
    volumes:
      - ..:/app
    command: python options_collector.py
    env_file:
      - "../.env.dev"
    depends_on:
      - mysql-dev
    restart: unless-stopped

  sentiment-tracker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sentiment-tracker-dev
    volumes:
      - ..:/app
    command: python sentiment_analyzer.py
    env_file:
      - "../.env.dev"
    depends_on:
      - mysql-dev
    restart: unless-stopped

  daily-etl:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: daily-etl-dev
    volumes:
      - ..:/app
    command: python daily_pipeline.py
    env_file:
      - "../.env.dev"
    depends_on:
      - mysql-dev
    restart: "no"  # Run once for testing

  # Local MySQL for development
  mysql-dev:
    image: mysql:8.0
    container_name: mysql-dev
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=devpassword
      - MYSQL_DATABASE=optionsdb_dev
    volumes:
      - mysql_dev_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_dev_data: