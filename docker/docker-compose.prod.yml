# Production environment - maintains exact same behavior as your current setup
version: '3.8'

services:
  option-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        DNS_SERVER: 8.8.8.8
    container_name: option-api
    network_mode: host
    working_dir: /app
    volumes:
      - /volume1/docker/option-data-collector:/app
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: >
      sh -c "pip install -r requirements.txt &&
             python app.py"
    env_file:
      - "../.env"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  option-scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        DNS_SERVER: 8.8.8.8
    container_name: option-scraper
    network_mode: host
    working_dir: /app
    volumes:
      - /volume1/docker/option-data-collector:/app
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # Uses new structured version with environment file
    command: >
      sh -c "pip install -r requirements.txt &&
             while true; do python options_collector.py; sleep ${SCRAPE_INTERVAL:-3600}; done"
    env_file:
      - "../.env"
    restart: unless-stopped

  sentiment-tracker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        DNS_SERVER: 8.8.8.8
    container_name: sentiment-tracker
    network_mode: host
    working_dir: /app
    volumes:
      - /volume1/docker/option-data-collector:/app
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: >
      sh -c "pip install -r requirements.txt &&
             while true; do python sentiment_analyzer.py; sleep 86400; done"
    env_file:
      - "../.env"
    restart: unless-stopped

  daily-etl:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        DNS_SERVER: 8.8.8.8
    container_name: daily-etl
    network_mode: host
    working_dir: /app
    volumes:
      - /volume1/docker/option-data-collector:/app
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # Run daily ETL at 18:00 (after market close)
    command: >
      sh -c "pip install -r requirements.txt &&
             while true; do 
               python daily_pipeline.py; 
               sleep 86400; 
             done"
    env_file:
      - "../.env"
    restart: unless-stopped