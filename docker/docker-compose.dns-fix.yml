# DNS-optimized compose for Synology Docker build issues
version: '3.8'

services:
  option-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dns-fix
    container_name: option-api
    network_mode: host
    working_dir: /app
    volumes:
      - /volume1/docker/option-data-collector:/app
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "pypi.org:151.101.1.63"
      - "pypi.python.org:151.101.1.63"
      - "files.pythonhosted.org:151.101.1.63"
    command: python app.py
    env_file:
      - "../.env"
    restart: unless-stopped

  option-scraper:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dns-fix
    container_name: option-scraper
    network_mode: host
    working_dir: /app
    volumes:
      - /volume1/docker/option-data-collector:/app
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "pypi.org:151.101.1.63"
      - "pypi.python.org:151.101.1.63" 
      - "files.pythonhosted.org:151.101.1.63"
    command: >
      sh -c "while true; do python options_collector.py; sleep \${SCRAPE_INTERVAL:-3600}; done"
    env_file:
      - "../.env"
    restart: unless-stopped

  sentiment-tracker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dns-fix
    container_name: sentiment-tracker
    network_mode: host
    working_dir: /app
    volumes:
      - /volume1/docker/option-data-collector:/app
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: python sentiment_analyzer.py
    env_file:
      - "../.env"
    restart: unless-stopped

  daily-etl:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dns-fix
    container_name: daily-etl
    network_mode: host
    working_dir: /app
    volumes:
      - /volume1/docker/option-data-collector:/app
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: python daily_pipeline.py
    env_file:
      - "../.env"
    restart: unless-stopped